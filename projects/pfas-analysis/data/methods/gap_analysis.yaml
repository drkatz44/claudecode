compounds_not_in_sop:
  description: >
    HFPO-DA (GenX) and ADONA are included in the QAPP target list but are NOT
    in the validated SOP method. These compounds require standalone validation
    on the 8060 — they cannot rely on SOP validation data for acceptance.
    Parameters in compounds.yaml are estimated, not SOP-validated.

  compounds:
    - compound: HFPO-DA
      other_name: GenX
      compound_class: ether
      cas: 13252-13-6
      in_qapp: true
      in_sop: false
      quantifier: "329 > 285"
      estimated_ce: 10
      estimated_rt_min: 1.8
      internal_standard: M3HFPO-DA
      status: needs_optimization
      validation_required: >
        Full standalone validation including calibration, precision,
        accuracy, MDL, matrix effects, and recovery. Cannot use SOP
        validation data. CE, pre-bias, and RT must be optimized on 8060.
      notes: >
        Dwell time set to 100 ms (vs 5 ms for SOP compounds) due to
        expected lower sensitivity. May need to increase injection volume
        or reduce final extract volume. Early eluter — may be affected
        by system dwell volume differences.

    - compound: ADONA
      other_name: Sodium dodecafluoro-3H-4,8-dioxanonanoate
      compound_class: ether
      cas: 958445-44-8
      in_qapp: true
      in_sop: false
      quantifier: "377 > 251"
      estimated_ce: 14
      estimated_rt_min: 2.3
      internal_standard: M3HFPO-DA
      status: needs_optimization
      validation_required: >
        Full standalone validation including calibration, precision,
        accuracy, MDL, matrix effects, and recovery. Cannot use SOP
        validation data. CE, pre-bias, and RT must be optimized on 8060.
      notes: >
        Dwell time set to 100 ms. Uses HFPO-DA IS (M3HFPO-DA) which
        is also not SOP-validated. Early eluter.

qc_criteria:
  description: >
    QC acceptance criteria from SOP Tables 4-5. Most criteria transfer
    directly; some may need adjustment if 8060 sensitivity differs.

  criteria:
    - parameter: Calibration r-squared
      sop_value: ">= 0.99"
      shimadzu_value: ">= 0.99"
      status: transferred
      notes: "SOP 4.1.1; stricter than QAPP requirement of >= 0.98"

    - parameter: Calibration range
      sop_value: "0.0125 - 50 ng/mL (13 points)"
      shimadzu_value: "0.0125 - 50 ng/mL (13 points)"
      status: transferred
      notes: "May need to adjust low end if 8060 MDLs differ significantly"

    - parameter: CCV acceptance
      sop_value: "+/- 30% (70-130%)"
      shimadzu_value: "+/- 30% (70-130%)"
      status: transferred
      notes: "SOP Table 5; lowest standard +/- 50%"

    - parameter: Method blank limit
      sop_value: "< 0.40 ng/L"
      shimadzu_value: "< 0.40 ng/L"
      status: transferred
      notes: "SOP 4.2.1.2"

    - parameter: LFB accuracy
      sop_value: "+/- 30% of expected"
      shimadzu_value: "+/- 30% of expected"
      status: transferred
      notes: "SOP Table 5"

    - parameter: Precision (IPA)
      sop_value: "RSD <= 20%"
      shimadzu_value: "RSD <= 20%"
      status: transferred
      notes: "SOP Table 4; 5 replicate LFBs"

    - parameter: Accuracy (IPA)
      sop_value: "+/- 30% of true value"
      shimadzu_value: "+/- 30% of true value"
      status: transferred
      notes: "SOP Table 4; mean recovery 70-130%"

    - parameter: Duplicate RPD
      sop_value: "<= 30%"
      shimadzu_value: "<= 30%"
      status: transferred
      notes: "SOP Table 5; analytical duplicates"

    - parameter: Recovery range
      sop_value: "70-130%"
      shimadzu_value: "70-130%"
      status: transferred
      notes: "SOP 7.3.4; flag outside range if CCV in spec"

    - parameter: MDL values
      sop_value: "SOP Table 7 (Waters TQD values)"
      shimadzu_value: "To be determined on 8060"
      status: needs_optimization
      notes: >
        MDLs must be re-established on 8060. Expected to be comparable
        or better due to UFsweeper III. Critical for QAPP data quality
        objectives. See SOP Table 7 for TQD reference values.

    - parameter: Dwell times
      sop_value: "5 ms (most compounds), 6-17 ms (short-chain)"
      shimadzu_value: "Starting at SOP values; 8060 supports 1-3 ms"
      status: needs_optimization
      notes: >
        8060 can use shorter dwell times than TQD due to faster
        polarity switching. May improve data density across peaks.
        Optimize for S/N vs data points per peak.
