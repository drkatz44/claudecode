# Gap Analysis: SOP (Waters Xevo TQD) vs Shimadzu LCMS-8060 Adaptation
# Source: SOP E-AED-PEB-SOP-1908-1, QAPP E-AED-0031514-QP-1-2
#
# Status values: transferred | needs_optimization | verified | not_applicable
#
# Each entry: parameter, sop_value, shimadzu_value, status, notes

lc_parameters:

  - parameter: Analytical column
    sop_value: "Waters Acquity BEH C18, 2.1 x 50 mm, 1.7 um"
    shimadzu_value: "Waters Acquity BEH C18, 2.1 x 50 mm, 1.7 um"
    status: transferred
    notes: Same column used on both systems; direct transfer

  - parameter: Column temperature
    sop_value: "45 C"
    shimadzu_value: "45 C (CTO-20A)"
    status: transferred
    notes: Direct transfer; verify CTO-20A setpoint accuracy

  - parameter: Mobile phase A
    sop_value: "2 mM ammonium acetate in water"
    shimadzu_value: "2 mM ammonium acetate in water"
    status: transferred
    notes: Identical preparation; use LC-MS grade water

  - parameter: Mobile phase B
    sop_value: "2 mM ammonium acetate in methanol"
    shimadzu_value: "2 mM ammonium acetate in methanol"
    status: transferred
    notes: >
      SOP labels as channel C; mapped to Shimadzu channel B.
      Use LC-MS grade methanol.

  - parameter: Flow rate
    sop_value: "0.4 mL/min"
    shimadzu_value: "0.4 mL/min"
    status: transferred
    notes: Direct transfer; LC-20AD XR pumps

  - parameter: Gradient program
    sop_value: "25% B at 0 min, hold 0.5 min, ramp to 85% B at 5.0 min, step to 95% at 5.1 min, hold to 7.0 min, re-equil to 25% at 9.0 min"
    shimadzu_value: "Same gradient programmed in LabSolutions"
    status: transferred
    notes: >
      SOP uses Waters curve 6 (linear) and curve 1 (step).
      Shimadzu linear ramp is equivalent to curve 6.
      Step function programmed as rapid ramp (0.1 min).
      Total run 9.0 min.

  - parameter: Injection volume
    sop_value: "40 uL"
    shimadzu_value: "40 uL (SIL-30AC MP)"
    status: transferred
    notes: Direct transfer

  - parameter: Autosampler temperature
    sop_value: "5 C"
    shimadzu_value: "5 C (SIL-30AC MP cooler)"
    status: transferred
    notes: Direct transfer

  - parameter: Needle wash
    sop_value: "MeOH + 0.1% formic acid"
    shimadzu_value: "MeOH + 0.1% formic acid"
    status: transferred
    notes: Before and after aspiration

  - parameter: System dwell volume
    sop_value: "~100 uL (Waters Acquity H-Class)"
    shimadzu_value: "~150-200 uL (Nexera X2, depends on mixer)"
    status: needs_optimization
    notes: >
      Larger dwell volume on Nexera X2 may cause 0.1-0.3 min RT shift
      for early-eluting compounds. May need to adjust gradient start
      time or reduce mixer volume. Verify with standards.

ms_source_parameters:

  - parameter: Ionization mode
    sop_value: "ESI negative"
    shimadzu_value: "ESI negative"
    status: transferred
    notes: Both systems use electrospray in negative mode

  - parameter: Capillary / Interface voltage
    sop_value: "1.00 kV (capillary voltage)"
    shimadzu_value: "1.0 kV (interface voltage)"
    status: needs_optimization
    notes: >
      Functionally analogous but different electrode geometry.
      Start at 1.0 kV and optimize via FIA.

  - parameter: Cone voltage / Q1 pre-bias
    sop_value: "20-45 V compound-specific (cone voltage)"
    shimadzu_value: "Optimize via MRM optimization (Q1 pre-rod bias)"
    status: needs_optimization
    notes: >
      No direct equivalent on 8060. TQD cone voltage affects
      in-source fragmentation and ion transmission. 8060 uses
      Q1 pre-rod bias for similar purpose but values are not
      transferable. Must optimize per compound.

  - parameter: Source temperature
    sop_value: "150 C (source housing)"
    shimadzu_value: "400 C (heat block)"
    status: needs_optimization
    notes: >
      Different physical meaning. TQD source temp heats the
      source housing; 8060 heat block heats the spray. Starting
      value 400 C; optimize for signal and stability.

  - parameter: Desolvation temperature
    sop_value: "400 C"
    shimadzu_value: "250 C (DL temperature)"
    status: needs_optimization
    notes: >
      TQD desolvation temp maps to 8060 DL (desolvation line)
      temperature. 8060 DL runs cooler than TQD desolvation.
      Also set interface temp = 300 C. Optimize both.

  - parameter: Cone gas flow
    sop_value: "30 L/hr"
    shimadzu_value: "10 L/min (drying gas)"
    status: needs_optimization
    notes: >
      Approximate functional analog. TQD cone gas = 30 L/hr (0.5 L/min);
      8060 drying gas = 10 L/min. Very different flow rates due to
      different source geometry. Optimize via FIA.

  - parameter: Desolvation gas flow
    sop_value: "800 L/hr (~13 L/min)"
    shimadzu_value: "3 L/min (nebulizing) + 10 L/min (heating gas)"
    status: needs_optimization
    notes: >
      TQD desolvation gas is split between 8060 nebulizing gas
      and heating gas. 8060 has separate heated gas line not
      present on TQD. Optimize both flows via FIA.

  - parameter: Collision gas
    sop_value: "Argon"
    shimadzu_value: "Argon"
    status: transferred
    notes: Same collision gas on both platforms

  - parameter: Interface temperature
    sop_value: "N/A (no TQD equivalent)"
    shimadzu_value: "300 C"
    status: needs_optimization
    notes: >
      8060-specific parameter. Set between TQD source temp (150 C)
      and desolvation temp (400 C). Optimize via FIA.

  - parameter: Heating gas flow
    sop_value: "N/A (no TQD equivalent)"
    shimadzu_value: "10 L/min"
    status: needs_optimization
    notes: >
      8060-specific heated gas that aids desolvation. No TQD equivalent.
      Optimize via FIA.

